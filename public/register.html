<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Surface</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-brand">
      <div class="auth-brand-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M3 13c2.2 0 2.2-2 4.5-2s2.3 2 4.5 2 2.2-2 4.5-2 2.3 2 4.5 2" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <path d="M3 18c2.2 0 2.2-2 4.5-2s2.3 2 4.5 2 2.2-2 4.5-2 2.3 2 4.5 2" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
        </svg>
      </div>
      <span class="auth-brand-name">Surface</span>
    </div>

    <div class="auth-card">
      <h1 class="auth-heading">Join the community</h1>
      <p class="text-muted" style="font-size:14.5px;margin-bottom:26px;">Create your freediving profile</p>

      <form id="regForm">
        <div class="form-group">
          <label class="label">Username</label>
          <input class="input" type="text" id="username" placeholder="deepdiver123" required>
        </div>
        <div class="form-group">
          <label class="label">Email</label>
          <input class="input" type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="label">Password</label>
          <input class="input" type="password" id="password" placeholder="At least 6 characters" required>
        </div>
        <div id="err"></div>
        <button class="btn btn-primary w-full" style="padding:13px;margin-top:6px;font-size:15px;" type="submit" id="submitBtn">
          Create Account
        </button>
      </form>

      <p class="text-muted" style="font-size:13.5px;margin-top:20px;text-align:center;">
        Already have an account?
        <a href="/login.html" class="text-accent" style="text-decoration:none;font-weight:600;">Sign in</a>
      </p>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script>
  if (Auth.getToken()) location.href = '/feed.html';

  document.getElementById('regForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('err');
    errEl.innerHTML = '';
    const password = document.getElementById('password').value;
    if (password.length < 6) {
      errEl.innerHTML = '<div class="alert-error">Password must be at least 6 characters</div>';
      return;
    }
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Creating account…';
    try {
      const data = await api.post('/auth/register', {
        username: document.getElementById('username').value,
        email:    document.getElementById('email').value,
        password,
      });
      Auth.set(data.user, data.token);
      location.href = '/feed.html';
    } catch (e) {
      errEl.innerHTML = `<div class="alert-error">${e.error || 'Registration failed'}</div>`;
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  });
</script>
</body>
</html>
