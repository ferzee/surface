<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Surface</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="nav"></div>

<div class="page-wide" id="profilePage">
  <div class="card card-p skeleton" style="height:200px;"></div>
</div>

<script src="/app.js"></script>
<script>
const me = Auth.require();
renderNav('');

const profileId = parseInt(new URLSearchParams(location.search).get('id') || me.id);
const isOwn = profileId === me.id;

let profile, dives, posts;
let activeTab = 'dives';
let diveFilter = 'all';

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

const DISC_COLORS = { static: '#6E8CA8', dynamic: '#3FA39B', depth: '#2E6E8E' };
const DISC_SUBS   = { static: 'Breath-hold', dynamic: 'Bi-fins', depth: 'Constant weight' };

async function load() {
  try {
    [profile, dives, posts] = await Promise.all([
      api.get(`/users/${profileId}`),
      api.get(`/dives/user/${profileId}`),
      api.get(`/posts/user/${profileId}`),
    ]);
    render();
  } catch(e) {
    document.getElementById('profilePage').innerHTML = '<div style="text-align:center;padding:60px;color:#93A8B1;font-size:15px;">User not found</div>';
  }
}

function render() {
  const rel = profile.buddyRelation;
  let buddyBtnLabel, buddyBtnClass, buddyDisabled = false;
  if (!rel)                                            { buddyBtnLabel = 'Connect'; buddyBtnClass = 'btn-primary'; }
  else if (rel.status === 'pending' && rel.sender_id === me.id) { buddyBtnLabel = 'Requested'; buddyBtnClass = 'btn-secondary'; buddyDisabled = true; }
  else if (rel.status === 'pending')                   { buddyBtnLabel = 'Accept'; buddyBtnClass = 'btn-primary'; }
  else if (rel.status === 'accepted')                  { buddyBtnLabel = 'Buddies ✓'; buddyBtnClass = 'btn-secondary'; }
  else                                                 { buddyBtnLabel = 'Connect'; buddyBtnClass = 'btn-primary'; }

  const coverGrad = headerGradient(profile.header_color);
  const avatarGrad = avatarGradient(profile.avatar_color);
  const initials = (profile.username || '?').slice(0, 2).toUpperCase();
  const profileAvatarHtml = profile.avatar
    ? `<div style="width:76px;height:76px;border-radius:22px;overflow:hidden;border:4px solid #fff;box-shadow:0 4px 14px rgba(14,42,51,0.14);"><img src="${escHtml(profile.avatar)}" style="width:100%;height:100%;object-fit:cover;"></div>`
    : `<div style="width:76px;height:76px;border-radius:22px;background:${avatarGrad};border:4px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:26px;box-shadow:0 4px 14px rgba(14,42,51,0.14);">${initials}</div>`;

  const page = document.getElementById('profilePage');
  page.innerHTML = `
    <!-- Cover + avatar -->
    <div class="card animate-in" style="margin-bottom:18px;overflow:hidden;">
      <div style="height:110px;background:${coverGrad};position:relative;">
        <div style="position:absolute;inset:0;background:radial-gradient(200px 100px at 80% 20%,rgba(255,255,255,0.18),transparent);"></div>
      </div>
      <div style="padding:0 20px 20px;margin-top:-38px;position:relative;">
        ${profileAvatarHtml}
        <div class="flex items-start" style="justify-content:space-between;margin-top:12px;flex-wrap:wrap;gap:10px;">
          <div>
            <h1 style="font-family:'Instrument Serif',Georgia,serif;font-weight:400;font-size:28px;color:#15323D;line-height:1.1;">${escHtml(profile.username)}</h1>
            ${profile.location ? `<div style="display:flex;align-items:center;gap:5px;margin-top:5px;font-size:13.5px;color:#7C95A0;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 21s7-5.5 7-11a7 7 0 1 0-14 0c0 5.5 7 11 7 11Z" stroke="#7C95A0" stroke-width="1.7"/></svg>${escHtml(profile.location)}</div>` : ''}
            ${(profile.diving_since || profile.dive_school) ? `<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:5px;font-size:13.5px;color:#7C95A0;">
              ${profile.diving_since ? `<span>Diving since <strong style="color:#15323D;">${profile.diving_since}</strong></span>` : ''}
              ${profile.dive_school ? `<span>${escHtml(profile.dive_school)}</span>` : ''}
            </div>` : ''}
            <div style="font-size:13.5px;color:#7C95A0;margin-top:6px;"><strong style="color:#15323D;">${profile.buddyCount}</strong> buddies · <strong style="color:#15323D;">${profile.diveCount}</strong> dives</div>
          </div>
          ${isOwn
            ? `<button class="btn btn-secondary btn-sm" id="editBtn">Edit profile</button>`
            : `<div class="flex gap-2">
                <button class="btn ${buddyBtnClass} btn-sm" id="buddyBtn" ${buddyDisabled ? 'disabled' : ''}>${buddyBtnLabel}</button>
                <button class="btn btn-secondary btn-sm" onclick="location.href='/inbox.html?to=${profileId}'">Message</button>
               </div>`
          }
        </div>
        ${profile.bio ? `<p style="margin-top:12px;font-size:14.5px;color:#34505B;line-height:1.55;">${escHtml(profile.bio)}</p>` : ''}
        ${profile.certifications && profile.certifications.length ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;">${profile.certifications.map(c => `<span style="font-size:12px;font-weight:600;padding:3px 11px;border-radius:999px;background:rgba(46,125,151,0.1);color:#2E7D97;">${escHtml(c)}</span>`).join('')}</div>` : ''}
      </div>
    </div>

    <!-- Personal Records -->
    <div style="margin-bottom:18px;">
      <div style="font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#93A8B1;margin-bottom:12px;">Personal Records</div>
      <div class="grid-3">
        ${recordCard('depth',   profile.records.depth)}
        ${recordCard('dynamic', profile.records.dynamic)}
        ${recordCard('static',  profile.records.static)}
      </div>
    </div>

    <!-- Tabs + content -->
    <div class="card animate-in">
      <div style="padding:16px 16px 0;">
        <div class="tabs">
          <button class="tab ${activeTab==='dives'?'active':''}" id="tabDives" onclick="switchTab('dives')">Dives (${dives.length})</button>
          <button class="tab ${activeTab==='posts'?'active':''}" id="tabPosts" onclick="switchTab('posts')">Posts (${posts.length})</button>
        </div>
      </div>
      <div id="tabContent"></div>
    </div>
  `;

  renderTabContent();

  if (!isOwn) {
    document.getElementById('buddyBtn')?.addEventListener('click', handleBuddyAction);
  }
  if (isOwn) {
    document.getElementById('editBtn')?.addEventListener('click', openEditModal);
  }
}

function recordCard(discipline, value) {
  const color = DISC_COLORS[discipline];
  const sub = DISC_SUBS[discipline];
  const label = fmt.disciplineLabel(discipline);
  let valueHtml;
  if (value != null) {
    if (discipline === 'static') {
      valueHtml = `<div class="record-value">${fmt.staticTime(value)}</div>`;
    } else {
      valueHtml = `<div class="record-value">${value}<span class="record-value-unit">m</span></div>`;
    }
  } else {
    valueHtml = `<div class="record-empty">—</div>`;
  }
  return `<div class="record-card">
    <span class="record-dot" style="background:${color};"></span>
    <div class="record-label">${label}</div>
    ${valueHtml}
    <div class="record-sublabel">${sub}</div>
  </div>`;
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab === 'dives' ? 'tabDives' : 'tabPosts').classList.add('active');
  renderTabContent();
}

function renderTabContent() {
  const el = document.getElementById('tabContent');
  if (activeTab === 'dives') {
    const filtered = diveFilter === 'all' ? dives : dives.filter(d => d.discipline === diveFilter);
    el.innerHTML = `
      <div style="padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-bottom:1px solid #F0F5F7;">
        <div class="flex gap-1">
          ${['all','depth','dynamic','static'].map(f => `
            <button style="padding:5px 13px;border-radius:999px;font-size:12.5px;font-weight:600;border:none;cursor:pointer;font-family:inherit;transition:all .15s;background:${diveFilter===f?'#2E7D97':'#F4F9FB'};color:${diveFilter===f?'#fff':'#7C95A0'};" onclick="setDiveFilter('${f}')">${f==='all'?'All':fmt.disciplineLabel(f)}</button>
          `).join('')}
        </div>
        ${isOwn ? `<button class="btn btn-primary btn-sm" onclick="openDiveLogger(onDiveLogged)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/></svg> Log Dive</button>` : ''}
      </div>
      <div>
        ${filtered.length === 0
          ? '<div style="text-align:center;padding:40px;color:#93A8B1;font-size:14px;">No dives logged yet</div>'
          : filtered.map(diveRow).join('')
        }
      </div>
    `;
  } else {
    el.innerHTML = posts.length === 0
      ? '<div style="text-align:center;padding:40px;color:#93A8B1;font-size:14px;">No posts yet</div>'
      : posts.map(postRow).join('');
  }
}

function diveRow(dive) {
  const color = DISC_COLORS[dive.discipline];
  return `<div class="flex items-center gap-3" style="padding:13px 16px;border-bottom:1px solid #F0F5F7;">
    <span style="width:9px;height:9px;border-radius:999px;flex:none;background:${color};"></span>
    <div style="flex:1;line-height:1.3;min-width:0;">
      <div style="font-size:14.5px;font-weight:500;color:#15323D;">${fmt.disciplineLabel(dive.discipline)}</div>
      <div style="font-size:12px;color:#93A8B1;margin-top:1px;">${dive.location ? escHtml(dive.location) + ' · ' : ''}${new Date(dive.dive_date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
    </div>
    <div style="font-family:'Instrument Serif',Georgia,serif;font-size:22px;color:#15323D;">${fmt.diveValue(dive.discipline, dive.value)}</div>
    ${isOwn ? `<button class="btn btn-ghost btn-sm" style="color:#C8D8DE;padding:4px 8px;flex-shrink:0;" onclick="deleteDive(${dive.id})">✕</button>` : ''}
  </div>`;
}

function postRow(post) {
  const isPostOwn = post.user_id === me.id;
  return `<div style="padding:16px;border-bottom:1px solid #F0F5F7;">
    <div class="flex items-start gap-3">
      ${fmt.avatar(post.username, post.avatar_color, 34, post.avatar || null)}
      <div class="flex-1" style="min-width:0;">
        <div class="flex" style="justify-content:space-between;align-items:center;">
          <div>
            <span style="font-weight:600;font-size:14px;color:#15323D;">${escHtml(post.username)}</span>
            <span style="font-size:12px;color:#93A8B1;margin-left:8px;">${fmt.timeAgo(post.created_at)}</span>
          </div>
          ${isPostOwn ? `<button class="btn btn-ghost btn-sm" style="color:#C8D8DE;padding:4px 8px;" onclick="deletePost(${post.id})">✕</button>` : ''}
        </div>
        <p style="margin-top:5px;font-size:14px;color:#34505B;white-space:pre-wrap;line-height:1.5;">${escHtml(post.content)}</p>
        <div class="flex gap-3 mt-2 text-quiet" style="font-size:12.5px;">
          <span>♥ ${post.like_count}</span>
          <span>💬 ${post.comment_count}</span>
        </div>
      </div>
    </div>
  </div>`;
}

function setDiveFilter(f) { diveFilter = f; renderTabContent(); }

function onDiveLogged(dive) {
  dives.unshift(dive);
  profile.diveCount++;
  if (profile.records[dive.discipline] === null || dive.value > profile.records[dive.discipline]) {
    profile.records[dive.discipline] = dive.value;
  }
  render();
}

function deleteDive(id) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" style="max-width:380px;text-align:center;">
      <div style="width:48px;height:48px;border-radius:50%;background:rgba(192,57,43,0.08);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#c0392b" stroke-width="1.8"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </div>
      <div class="modal-title" style="margin-bottom:8px;">Delete dive?</div>
      <p style="color:#5B7682;font-size:14px;margin:0 0 24px;">This can't be undone.</p>
      <div style="display:flex;gap:10px;">
        <button id="delCancelBtn" class="btn btn-secondary" style="flex:1;">Cancel</button>
        <button id="delConfirmBtn" class="btn" style="flex:1;background:linear-gradient(135deg,#c0392b,#962d22);color:#fff;border:none;">Delete</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  const close = () => document.body.removeChild(overlay);
  overlay.querySelector('#delCancelBtn').onclick = close;
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  overlay.querySelector('#delConfirmBtn').onclick = async () => {
    close();
    try {
      await api.del(`/dives/${id}`);
      dives = dives.filter(d => d.id !== id);
      profile.diveCount = Math.max(0, profile.diveCount - 1);
      profile.records = { static: null, dynamic: null, depth: null };
      dives.forEach(d => {
        if (profile.records[d.discipline] === null || d.value > profile.records[d.discipline])
          profile.records[d.discipline] = d.value;
      });
      render();
    } catch {}
  };
}

async function deletePost(id) {
  if (!confirm('Delete this post?')) return;
  try {
    await api.del(`/posts/${id}`);
    posts = posts.filter(p => p.id !== id);
    render();
  } catch {}
}

async function handleBuddyAction() {
  const btn = document.getElementById('buddyBtn');
  if (btn) btn.disabled = true;
  try {
    const rel = profile.buddyRelation;
    if (!rel) {
      await api.post(`/buddies/request/${profileId}`);
      profile.buddyRelation = { status: 'pending', sender_id: me.id };
    } else if (rel.status === 'pending' && rel.sender_id !== me.id) {
      await api.put(`/buddies/request/${rel.id}`, { status: 'accepted' });
      profile.buddyRelation = { ...rel, status: 'accepted' };
      profile.buddyCount++;
    } else if (rel.status === 'accepted') {
      if (!confirm('Remove this buddy?')) { if (btn) btn.disabled = false; return; }
      await api.del(`/buddies/${profileId}`);
      profile.buddyRelation = null;
      profile.buddyCount = Math.max(0, profile.buddyCount - 1);
    }
    render();
  } catch(e) {
    alert(e.error || 'Action failed');
    if (btn) btn.disabled = false;
  }
}

const CERT_GROUPS = [
  { label: 'AIDA',        items: ['AIDA 2', 'AIDA 3', 'AIDA 4', 'AIDA Instructor'] },
  { label: 'SSI',         items: ['SSI Level 1', 'SSI Level 2', 'SSI Level 3', 'SSI Instructor'] },
  { label: 'PADI',        items: ['PADI Freediver', 'PADI Advanced Freediver', 'PADI Master Freediver', 'PADI Instructor'] },
  { label: 'Molchanovs',  items: ['Molchanovs Wave 1', 'Molchanovs Wave 2', 'Molchanovs Wave 3'] },
];

function openEditModal() {
  const avatarGrad = avatarGradient(profile.avatar_color);
  const initials = (profile.username || '?').slice(0, 2).toUpperCase();
  const currentAvatarHtml = profile.avatar
    ? `<img src="${escHtml(profile.avatar)}" style="width:100%;height:100%;object-fit:cover;">`
    : initials;

  const headerColorKeys = ['ocean', 'teal', 'midnight', 'slate', 'seafoam', 'dusk'];
  const headerColorLabels = { ocean: 'Ocean', teal: 'Teal', midnight: 'Midnight', slate: 'Slate', seafoam: 'Seafoam', dusk: 'Dusk' };
  let selectedHeaderColor = profile.header_color || 'ocean';
  let selectedCerts = new Set(profile.certifications || []);

  const swatchesHtml = headerColorKeys.map(key => `
    <button type="button" class="hc-swatch" data-key="${key}" title="${headerColorLabels[key]}"
      style="width:36px;height:36px;border-radius:10px;border:3px solid ${selectedHeaderColor===key?'#2E7D97':'transparent'};background:${HEADER_GRADIENTS[key]};cursor:pointer;transition:border-color .15s;outline:none;flex-shrink:0;"
    ></button>
  `).join('');

  const certGroupsHtml = CERT_GROUPS.map(g => `
    <div style="margin-bottom:10px;">
      <div style="font-size:11.5px;font-weight:700;color:#93A8B1;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;">${g.label}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">
        ${g.items.map(item => `
          <button type="button" class="cert-pill" data-cert="${escHtml(item)}"
            style="padding:4px 12px;border-radius:999px;font-size:12.5px;font-weight:600;border:1.5px solid ${selectedCerts.has(item)?'#2E7D97':'#DCE7EB'};background:${selectedCerts.has(item)?'rgba(46,125,151,0.1)':'#fff'};color:${selectedCerts.has(item)?'#2E7D97':'#7C95A0'};cursor:pointer;transition:all .15s;font-family:inherit;"
          >${escHtml(item)}</button>
        `).join('')}
      </div>
    </div>
  `).join('');

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Edit profile</span>
        <button class="modal-close" id="editClose">✕</button>
      </div>
      <div class="form-group">
        <label class="label">Photo</label>
        <div style="display:flex;align-items:center;gap:14px;">
          <div id="avatarPreview" style="width:60px;height:60px;border-radius:17px;overflow:hidden;background:${avatarGrad};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:22px;flex-shrink:0;">${currentAvatarHtml}</div>
          <div>
            <label class="btn btn-secondary btn-sm" for="avatarInput" style="cursor:pointer;display:inline-block;">Change photo</label>
            <input type="file" id="avatarInput" accept="image/*" style="display:none;">
            <div style="font-size:12px;color:#93A8B1;margin-top:5px;">JPG, PNG or WebP · max 5 MB</div>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="label">Username</label>
        <input class="input" type="text" id="editUsername" value="${escHtml(profile.username || '')}" placeholder="Your username">
      </div>
      <div class="form-group">
        <label class="label">Header colour</label>
        <div id="hcSwatches" style="display:flex;gap:8px;flex-wrap:wrap;">${swatchesHtml}</div>
        <div id="hcPreview" style="margin-top:10px;height:36px;border-radius:10px;background:${headerGradient(selectedHeaderColor)};transition:background .2s;"></div>
      </div>
      <div class="form-group">
        <label class="label">Bio</label>
        <textarea class="input" id="editBio" rows="3" placeholder="Tell the community about yourself…">${escHtml(profile.bio || '')}</textarea>
      </div>
      <div class="form-group">
        <label class="label">Location</label>
        <input class="input" type="text" id="editLoc" placeholder="e.g. Dahab, Egypt" value="${escHtml(profile.location || '')}">
      </div>
      <div class="form-group">
        <label class="label">Diving since</label>
        <input class="input" type="number" id="editDivingSince" min="1950" max="${new Date().getFullYear()}" placeholder="e.g. 2018" value="${profile.diving_since || ''}">
      </div>
      <div class="form-group">
        <label class="label">Dive school</label>
        <input class="input" type="text" id="editDiveSchool" placeholder="e.g. Alchemy Dive Center" value="${escHtml(profile.dive_school || '')}">
      </div>
      <div class="form-group">
        <label class="label">Certifications</label>
        ${certGroupsHtml}
      </div>
      <div id="editErr"></div>
      <div class="flex gap-2 mt-3">
        <button class="btn btn-secondary flex-1" id="editCancel">Cancel</button>
        <button class="btn btn-primary flex-1" id="editSave">Save</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  overlay.querySelectorAll('.hc-swatch').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedHeaderColor = btn.dataset.key;
      overlay.querySelectorAll('.hc-swatch').forEach(b => {
        b.style.borderColor = b.dataset.key === selectedHeaderColor ? '#2E7D97' : 'transparent';
      });
      overlay.querySelector('#hcPreview').style.background = headerGradient(selectedHeaderColor);
    });
  });

  overlay.querySelectorAll('.cert-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      const cert = btn.dataset.cert;
      if (selectedCerts.has(cert)) {
        selectedCerts.delete(cert);
        btn.style.borderColor = '#DCE7EB';
        btn.style.background = '#fff';
        btn.style.color = '#7C95A0';
      } else {
        selectedCerts.add(cert);
        btn.style.borderColor = '#2E7D97';
        btn.style.background = 'rgba(46,125,151,0.1)';
        btn.style.color = '#2E7D97';
      }
    });
  });

  const close = () => overlay.remove();
  overlay.querySelector('#editClose').addEventListener('click', close);
  overlay.querySelector('#editCancel').addEventListener('click', close);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  overlay.querySelector('#avatarInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      overlay.querySelector('#avatarPreview').innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
    };
    reader.readAsDataURL(file);
  });
  overlay.querySelector('#editSave').addEventListener('click', async () => {
    const btn = overlay.querySelector('#editSave');
    const errEl = overlay.querySelector('#editErr');
    errEl.innerHTML = '';
    const newUsername = overlay.querySelector('#editUsername').value.trim();
    if (!newUsername) { errEl.innerHTML = '<div class="alert-error">Username cannot be empty</div>'; return; }
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const fileInput = overlay.querySelector('#avatarInput');
      if (fileInput.files[0]) {
        const formData = new FormData();
        formData.append('avatar', fileInput.files[0]);
        await api.upload('/users/me/avatar', formData);
      }
      const dsVal = overlay.querySelector('#editDivingSince').value;
      const updated = await api.put('/users/me', {
        username:      newUsername,
        bio:           overlay.querySelector('#editBio').value,
        location:      overlay.querySelector('#editLoc').value,
        header_color:  selectedHeaderColor,
        certifications: [...selectedCerts],
        diving_since:  dsVal ? parseInt(dsVal) : null,
        dive_school:   overlay.querySelector('#editDiveSchool').value,
      });
      profile = { ...profile, ...updated };
      Auth.set({ ...me, ...updated }, Auth.getToken());
      render();
      close();
    } catch(e) {
      errEl.innerHTML = `<div class="alert-error">${e.error || 'Save failed'}</div>`;
      btn.disabled = false; btn.textContent = 'Save';
    }
  });
}

load();
</script>
</body>
</html>
